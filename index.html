<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vite + TS</title>
</head>

<body>
  <main>
    <div tabindex="0" id="toolbar">
      <button id="undo" aria-label="Undo last operation" disabled>
        <svg>
          <use href="#icon-return"></use>
        </svg>
      </button>
      <button id="redo" aria-label="Redo last operation" disabled>
        <svg>
          <use href="#icon-return" transform="scale(-1, 1)" transform-origin="50% 50%"></use>
        </svg>
      </button>
      <button id="break-handles" aria-label="Stop mirroring control points handles" disabled>
        <svg>
          <use href="#icon-break-handles"></use>
        </svg>
      </button>
      <button id="mirror-handles" aria-label="Mirror control points handles" disabled>
        <svg>
          <use href="#icon-mirror-handles"></use>
        </svg>
      </button>
      <button id="delete-point" aria-label="Delete selected point" disabled>
        <svg>
          <use href="#icon-trash-bin"></use>
        </svg>
      </button>
    </div>
    <div id="pan-zoom-area">
      <div class="editor-container">
        <div class="bottom-toolbar">
          <input id="timeline" type="range" min="0" max="1" step="0.00001" />
          <button id="reset-state">Stop</button>
        </div>
        <svg class="spline-preview" viewBox="0 0 1 1" preserveAspectRatio="none">
          <path id="path-exact" d="" vector-effect="non-scaling-stroke" stroke="black" stroke-width="2px" fill="none" />
          <path id="path-approx" d="" vector-effect="non-scaling-stroke" stroke="red" stroke-width="2px" fill="none" />

        </svg>
        <div id="spline-anim-progress"></div>
        <div class="cps"></div>

        <ul class="ruler ruler-y">
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
        </ul>

        <ul class="ruler ruler-x">
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
        </ul>

      </div>
    </div>
    <aside>
      <h2>Easing CSS Output</h2>
      <div class="output-preview">
        <div id="preview-target-box"></div>
      </div>

      <label for="animation-loop">Loop animation:</label>
      <input type="checkbox" id="animation-loop" />

      <label for="animation-time">Animation time(ms):</label>
      <input type="number" id="animation-time" min="0" step="100" value="3000" />

      <code id="code-snippet"></code>
      <label for="func-precision">Precision:</label>
      <input type="number" id="func-precision" step="0.001" value="0.02" min="0.001" max="0.2" />
    </aside>
  </main>

  <svg>
    <symbol viewBox="0 0 417 417" id="icon-return">
      <path fill="currentColor"
        d="M73.526,142.654l67.808,67.808c8.13,8.13 8.13,21.332 -0,29.463c-8.13,8.13 -21.332,8.13 -29.463,-0l-100.886,-100.887c-8.136,-8.136 -8.136,-21.327 -0,-29.463l100.886,-100.886c8.131,-8.131 21.333,-8.131 29.463,-0c8.13,8.13 8.13,21.332 -0,29.462l-67.002,67.003l188.208,-0c83.055,-0 150.484,67.429 150.484,150.484c0,83.054 -67.429,150.484 -150.484,150.484l-88.995,-0c-10.348,-0 -18.75,-8.402 -18.75,-18.75c0,-10.349 8.402,-18.75 18.75,-18.75l88.995,-0c62.358,-0 112.984,-50.627 112.984,-112.984c0,-62.358 -50.626,-112.984 -112.984,-112.984l-189.014,-0Z" />
    </symbol>
    <symbol id="icon-break-handles" viewBox="0 0 100 100">
      <circle cx="51.482" cy="75" r="18" style="fill:none;stroke:currentColor;stroke-width:10px;" />
      <path d="M13.199,11.073L43.305,63.405"
        style="fill:none;stroke:currentColor;stroke-width:8px;stroke-linecap:butt;" />
      <path d="M60.147,63.91L89.24,9.988" style="fill:none;stroke:currentColor;stroke-width:8px;stroke-linecap:butt;" />
      <circle cx="85" cy="12" r="12" fill="currentColor" />
      <circle cx="15" cy="12" r="12" fill="currentColor" />
    </symbol>
    <symbol viewBox="0 0 100 100" id="icon-mirror-handles">
      <circle cx="52.207" cy="50.428" r="18" style="fill:none;stroke:currentColor;stroke-width:10px;" />
      <path d="M17.142,85.998L39.997,61.928"
        style="fill:none;stroke:currentColor;stroke-width:8px;stroke-linecap:butt;" />
      <path d="M64.117,37.564L86.824,11.777"
        style="fill:none;stroke:currentColor;stroke-width:8px;stroke-linecap:butt;" />
      <circle cx="86.977" cy="12.815" r="12" fill="currentColor" />
      <circle cx="14.98" cy="86.137" r="12" fill="currentColor" />
    </symbol>
    <symbol id="icon-trash-bin" viewBox="0 0 24 24">
      <path fill="none"
        d="M4 6H20M16 6L15.7294 5.18807C15.4671 4.40125 15.3359 4.00784 15.0927 3.71698C14.8779 3.46013 14.6021 3.26132 14.2905 3.13878C13.9376 3 13.523 3 12.6936 3H11.3064C10.477 3 10.0624 3 9.70951 3.13878C9.39792 3.26132 9.12208 3.46013 8.90729 3.71698C8.66405 4.00784 8.53292 4.40125 8.27064 5.18807L8 6M18 6V16.2C18 17.8802 18 18.7202 17.673 19.362C17.3854 19.9265 16.9265 20.3854 16.362 20.673C15.7202 21 14.8802 21 13.2 21H10.8C9.11984 21 8.27976 21 7.63803 20.673C7.07354 20.3854 6.6146 19.9265 6.32698 19.362C6 18.7202 6 17.8802 6 16.2V6M14 10V17M10 10V17"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </symbol>
  </svg>


  <script type="module" src="/src/main.ts"></script>
</body>

</html>
